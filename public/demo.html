<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shopify FAQ Popup Demo</title>
    <style>
      body {
        background: #f5f5f5;
        color: #0f0f0f;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        min-height: 100vh;
      }

      main {
        display: grid;
        gap: 12px;
        padding: 48px;
      }

      h1,
      p {
        margin: 0;
        max-width: 680px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Store preview</h1>
      <p>Use the support button in the bottom-right corner to test the FAQ and order tracking popup.</p>
    </main>

    <script>
      window.ShopifyFaqPopupConfig = {
        apiBaseUrl: "",
        brandName: "GATEKEPT",
        logoUrl: "/gatekept-logo-pink.png"
      };
    </script>
    <script src="/widget.js" defer></script>
  </body>
</html>
